<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Card</title>
  <link rel="stylesheet" href="weather.css">
</head>
<body>

<div class="container">

  <div class="card">
    <h2 class="logo">🌤️ Weather</h2>

    <div id="loader" class="loader"></div>

    <div id="weatherContent" class="hidden">
      <h3 id="city">Mumbai</h3>
      <p id="temp">-- °C</p>
      <p id="wind">Wind: -- km/h</p>

      <button onclick="getWeather()">Refresh</button>
    </div>

  </div>

</div>

<script src="weather.js"></script>
</body>
</html>
